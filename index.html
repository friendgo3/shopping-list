<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #4f8ef7; }

    .input-row button {
      padding: 12px 20px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #2d6fe0; }
    .input-row button:disabled { background: #a0b8f0; cursor: not-allowed; }

    .stats {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 12px;
    }

    .stats span { color: #4f8ef7; font-weight: 600; }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 10px;
      transition: background 0.15s;
      cursor: pointer;
    }

    li:hover { background: #f7f8fa; }

    li.done .item-text {
      text-decoration: line-through;
      color: #bbb;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #ccc;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
    }

    li.done .checkbox {
      background: #4f8ef7;
      border-color: #4f8ef7;
    }

    .checkbox svg { display: none; }
    li.done .checkbox svg { display: block; }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #1a1a1a;
      transition: color 0.2s;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      font-size: 1.1rem;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
      opacity: 0;
    }

    li:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: #e74c3c; background: #ffeaea; }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .loading {
      text-align: center;
      color: #aaa;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .error-banner {
      background: #fff0f0;
      color: #e74c3c;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.875rem;
      margin-bottom: 16px;
      display: none;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: none;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      color: #aaa;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .clear-btn:hover { border-color: #e74c3c; color: #e74c3c; }
  </style>
</head>
<body>
  <div class="app">
    <h1>🛒 쇼핑 리스트</h1>
    <div class="input-row">
      <input id="itemInput" type="text" placeholder="아이템 추가..." />
      <button id="addBtn" onclick="addItem()">추가</button>
    </div>
    <div class="error-banner" id="errorBanner"></div>
    <div class="stats" id="stats"></div>
    <ul id="list"></ul>
    <div class="loading" id="loading">불러오는 중...</div>
    <div class="empty" id="empty" style="display:none">아직 아이템이 없어요.</div>
    <button class="clear-btn" onclick="clearDone()">완료 항목 삭제</button>
  </div>

  <script>
    const SUPABASE_URL = 'https://cvapxufmzogrcnizjbvh.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Ko1Sahvij_qI0dtw5b0dQA_xWeA3qOw';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    let items = [];

    function showError(msg) {
      const el = document.getElementById('errorBanner');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const loading = document.getElementById('loading');
      const stats = document.getElementById('stats');

      loading.style.display = 'none';

      const done = items.filter(i => i.done).length;
      stats.innerHTML = items.length
        ? `총 <span>${items.length}</span>개 중 <span>${done}</span>개 완료`
        : '';
      empty.style.display = items.length ? 'none' : 'block';

      list.innerHTML = items.map(item => `
        <li class="${item.done ? 'done' : ''}" onclick="toggle('${item.id}', ${item.done})">
          <div class="checkbox">
            <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
              <path d="M1 5l3.5 3.5L11 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="item-text">${escapeHtml(item.text)}</span>
          <button class="delete-btn" onclick="event.stopPropagation(); remove('${item.id}')">✕</button>
        </li>
      `).join('');
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function loadItems() {
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) { showError('불러오기 실패: ' + error.message); return; }
      items = data;
      render();
    }

    async function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;

      const btn = document.getElementById('addBtn');
      btn.disabled = true;

      const { data, error } = await db
        .from('shopping_items')
        .insert({ text })
        .select()
        .single();

      btn.disabled = false;

      if (error) { showError('추가 실패: ' + error.message); return; }
      input.value = '';
      items.unshift(data);
      render();
    }

    async function toggle(id, currentDone) {
      const { error } = await db
        .from('shopping_items')
        .update({ done: !currentDone })
        .eq('id', id);

      if (error) { showError('업데이트 실패: ' + error.message); return; }
      const item = items.find(i => i.id === id);
      if (item) item.done = !currentDone;
      render();
    }

    async function remove(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) { showError('삭제 실패: ' + error.message); return; }
      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearDone() {
      const doneIds = items.filter(i => i.done).map(i => i.id);
      if (!doneIds.length) return;

      const { error } = await db
        .from('shopping_items')
        .delete()
        .in('id', doneIds);

      if (error) { showError('삭제 실패: ' + error.message); return; }
      items = items.filter(i => !i.done);
      render();
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    loadItems();
  </script>
</body>
</html>
